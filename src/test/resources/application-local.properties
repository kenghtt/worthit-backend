# Test-only override of the "local" profile (the existing context test uses @ActiveProfiles("local")).
# Use in-memory H2 so the Spring context boots without needing a real Postgres on the test box.
# We disable schema generation (ddl-auto=none) because Postgres-specific column types like JSONB
# and CHECK constraints in the spec cannot be created on H2; full schema fidelity will come with
# Flyway migrations later.

spring.datasource.url=jdbc:h2:mem:worthit-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Skip the lookup seeder in tests — H2 has no schema (ddl-auto=none) so DB calls would fail.
app.seed.enabled=false
