# Local profile overrides.
# Auth stays disabled locally so the hello endpoint and any future dev work
# don't require a JWT provider. Flip `security.auth.enabled` to true once
# a real auth provider is wired up.

security.auth.enabled=false
logging.level.com.worthit.backend=DEBUG

