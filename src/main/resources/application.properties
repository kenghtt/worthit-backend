spring.application.name=worthit-backend

# Default profile for local dev. Override with -Dspring.profiles.active=prod or SPRING_PROFILES_ACTIVE.
spring.profiles.active=local

# Optional, app-local secrets file (kept out of git). Loaded only if present.
spring.config.import=optional:secrets.properties

# Server
server.port=8080

# -----------------------------------------------------------------------------
# Security / JWT
# -----------------------------------------------------------------------------
# Starter ships with auth DISABLED so the app boots without any external provider.
# When wiring a real auth provider, set security.auth.enabled=true and provide the values below.
security.auth.enabled=false

# JWT validation (used only when security.auth.enabled=true)
# TODO(worthIt): fill these in once the auth provider (Supabase / Auth0 / Cognito / ...) is chosen.
security.jwt.issuer=
security.jwt.jwks-uri=
security.jwt.expected-audience=
security.jwt.secret=

# CORS
# Comma-separated list of allowed origins for the frontend(s).
# TODO(worthIt): set the real worthIt web/mobile origins here per environment.
app.security.cors.allowed-origins=http://localhost:3000

# -----------------------------------------------------------------------------
# Database / JPA
# -----------------------------------------------------------------------------
# Datasource. Override per-profile (see application-local.properties / application-prod.properties).
# Password is expected to come from secrets.properties or an env var (SPRING_DATASOURCE_PASSWORD).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/worthit}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:worthit_app}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool sizing (spec section 6.8: 10-20).
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate.
# ddl-auto=update: Hibernate manages schema from @Entity classes (Flyway intentionally not used yet).
# NOTE: CHECK constraints, partial indexes, and materialized views from the spec are NOT generated
# by Hibernate; they will need to be added later (Flyway or manual SQL) before going to production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Database Seeding
app.seed.enabled=false

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.worthit.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
