spring.application.name=worthit-backend

# Default profile for local dev. Override with -Dspring.profiles.active=prod or SPRING_PROFILES_ACTIVE.
spring.profiles.active=local

# Optional, app-local secrets file (kept out of git). Loaded only if present.
spring.config.import=optional:secrets.properties

# Server
server.port=8080

# -----------------------------------------------------------------------------
# Security / JWT
# -----------------------------------------------------------------------------
# Starter ships with auth DISABLED so the app boots without any external provider.
# When wiring a real auth provider, set security.auth.enabled=true and provide the values below.
security.auth.enabled=false

# JWT validation (used only when security.auth.enabled=true)
# TODO(worthIt): fill these in once the auth provider (Supabase / Auth0 / Cognito / ...) is chosen.
security.jwt.issuer=
security.jwt.jwks-uri=
security.jwt.expected-audience=
security.jwt.secret=

# CORS
# Comma-separated list of allowed origins for the frontend(s).
# TODO(worthIt): set the real worthIt web/mobile origins here per environment.
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.worthit.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
