# Production profile overrides.
# Enable JWT validation in production and require all sensitive values via environment variables.

security.auth.enabled=true

# TODO(worthIt): provide real values via env vars / secret manager in prod:
#   SECURITY_JWT_ISSUER, SECURITY_JWT_JWKS_URI, SECURITY_JWT_EXPECTED_AUDIENCE,
#   APP_SECURITY_CORS_ALLOWED_ORIGINS
security.jwt.issuer=${SECURITY_JWT_ISSUER:}
security.jwt.jwks-uri=${SECURITY_JWT_JWKS_URI:}
security.jwt.expected-audience=${SECURITY_JWT_EXPECTED_AUDIENCE:}
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:}

logging.level.root=INFO
logging.level.com.worthit.backend=INFO
